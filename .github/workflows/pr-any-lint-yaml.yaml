---
# Lint YAML with ryl
name: Lint YAML

run-name: >
  ${{
    github.event_name == 'pull_request' && 'PR' ||
    (
      github.event_name == 'push' &&
      (contains(github.event.head_commit.message, 'Merge') || contains(github.event.head_commit.message, '(#'))
    ) && 'Merge' ||
    github.event_name == 'push' && 'Direct' ||
    github.event_name == 'schedule' && 'Cron' ||
    github.event_name
  }}
  ${{ github.event.pull_request.number && format(' #{0}', github.event.pull_request.number) || '' }}
  ${{ (github.actor && github.actor != 'github-actions[bot]') && format(' by @{0}', github.actor) || '' }} -
  ${{ github.workflow }} on ${{ github.head_ref || github.ref_name }} -
  ${{ github.event.pull_request.title || github.event.head_commit.message || github.ref_name }}

on:  # ryl disable-line rule:truthy
  pull_request:
    paths:
      - '**.yml'
      - '**/*ryl.toml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-yaml:
    name: Run ryl
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-slim
    steps:
      - name: 🛎️ GitHub checkout branch "${{ github.head_ref || github.ref_name }}"
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: 🔍 Get changed files
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4.0.2
        with:
          filters: |
            yaml:
              - added|modified: '**.yml'
              - added|modified: '**.yaml'
            rylconf:
              - added|modified: '{.,}ryl.toml'
              - added|modified: '.config/{.,}ryl.toml'
          list-files: escape
      - name: ⬇️ Install the latest version of uv
        if: steps.filter.outputs.yaml == 'true' || steps.filter.outputs.rylconf == 'true'
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
        with:
          cache-dependency-glob: ''
          enable-cache: true
          # renovate: datasource=github-releases depName=astral-sh/uv
          version: 0.11.29
      - name: 🔍 Lint changed YAML files with ryl
        if: steps.filter.outputs.yaml == 'true' && steps.filter.outputs.rylconf == 'false'
        shell: bash
        run: uvx --config-file .config/uv.toml ryl ${{ steps.filter.outputs.markdown_files }}
      - name: 🔍 Lint all YAML files with ryl when ".ryl.toml" is updated
        if: steps.filter.outputs.rylconf == 'true'
        shell: bash
        run: uvx --config-file .config/uv.toml ryl .
