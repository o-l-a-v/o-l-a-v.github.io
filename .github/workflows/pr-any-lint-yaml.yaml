---
name: Lint YAML with ryl

run-name: '${{ github.workflow }} - [${{ github.event.pull_request.title }} #${{ github.event.pull_request.number }}] by @${{ github.actor }}'

on:  # ryl disable-line rule:truthy
  pull_request:
    paths:
      - '**.yml'
      - '**/*ryl.toml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-yaml:
    name: Run ryl
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-slim
    steps:
      - name: 🛎️ GitHub checkout branch "${{ github.head_ref || github.ref_name }}"
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: 🔍 Get changed files
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4.0.2
        with:
          filters: |
            yaml:
              - added|modified: '**.yml'
              - added|modified: '**.yaml'
            rylconf:
              - added|modified: '{.,}ryl.toml'
              - added|modified: '.config/{.,}ryl.toml'
          list-files: escape
      - name: ⬇️ Install the latest version of uv
        if: steps.filter.outputs.yaml == 'true' || steps.filter.outputs.rylconf == 'true'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          cache-dependency-glob: ''
          enable-cache: true
          # renovate: datasource=github-releases depName=astral-sh/uv
          version: 0.11.28
      - name: 🔍 Lint changed YAML files with ryl
        if: steps.filter.outputs.yaml == 'true' && steps.filter.outputs.rylconf == 'false'
        shell: bash
        run: uvx --config-file .config/uv.toml ryl ${{ steps.filter.outputs.markdown_files }}
      - name: 🔍 Lint all YAML files with ryl when ".ryl.toml" is updated
        if: steps.filter.outputs.rylconf == 'true'
        shell: bash
        run: uvx --config-file .config/uv.toml ryl .
