---
# Deploy to Cloudflare Pages and GitHub Pages
name: Deploy

run-name: >
  ${{
    github.event_name == 'pull_request' && 'PR' ||
    (
      github.event_name == 'push' &&
      (contains(github.event.head_commit.message, 'Merge') || contains(github.event.head_commit.message, '(#'))
    ) && 'Merge' ||
    github.event_name == 'push' && 'Direct' ||
    github.event_name == 'schedule' && 'Cron' ||
    github.event_name
  }}
  ${{ github.event.pull_request.number && format(' #{0}', github.event.pull_request.number) || '' }}
  by @${{ github.actor }} -
  ${{ github.workflow }} on ${{ github.head_ref || github.ref_name }} -
  ${{ github.event.pull_request.title || github.event.head_commit.message || github.ref_name }}

on:  # ryl disable-line rule:truthy
  push:
    branches:
      - main
    paths:
      - website/**

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Docusaurus
    defaults:
      run:
        working-directory: ./website
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ GitHub checkout branch "${{ github.head_ref || github.ref_name }}"
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: ⚙️ Enable corepack
        # zizmor: ignore[adhoc-packages]
        run: |
          if ! command -v corepack &>/dev/null; then
            npm install --global corepack@0.35.0
          fi
          corepack enable
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: yarn
          cache-dependency-path: ./website/yarn.lock
          node-version-file: ./website/.node-version
      - name: 🧶 Yarn install
        run: yarn install --immutable
      - name: 🔨 Node.js build
        run: node --run build
      - name: ⬆️ Upload build artifact
        uses: actions/upload-artifact@v7
        id: artifact
        with:
          if-no-files-found: error
          name: build-artifact
          path: website/build/
      - name: ⬆️ Upload build artifact specific for GitHub Pages
        uses: actions/upload-pages-artifact@v5
        id: artifact-ghp
        with:
          name: build-artifact-ghp
          path: website/build/
  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    environment: deploy
    needs: build
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-slim
    steps:
      - name: ⬇️ Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
          path: build-artifact
      - name: 🚢 Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy build-artifact --branch=production --project-name=${{ vars.CLOUDFLARE_PAGES_NAME }}
  deploy-github:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.artifact-ghp.outputs.page_url }}
    needs: build
    permissions:
      contents: read
      id-token: write
      pages: write
    runs-on: ubuntu-slim
    steps:
      - name: 🚢 Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
        with:
          artifact_name: build-artifact-ghp
