---
name: Ensure changed files follow EditorConfig settings

run-name: >
  ${{ github.event_name }} by @${{ github.actor }} -
  ${{ github.workflow }}
  ${{ github.event.pull_request.number && format(' [#{0}] -', github.event.pull_request.number) || '-' }}
  ${{ github.event.pull_request.title || github.event.head_commit.message || github.ref_name }}

on:  # ryl disable-line rule:truthy
  pull_request:
    paths:
      - '**.json'
      - '**.jsonc'
      - '**.md'
      - '**.ps1'
      - '**.yaml'
      - '**.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Find relevant changed files
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
      files: ${{ steps.filter.outputs.changed_files }}
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-slim
    steps:
      - name: 🛎️ GitHub checkout branch "${{ github.head_ref || github.ref_name }}"
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: 🔍 Get changed files
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4.0.2
        with:
          filters: |
            changed:
              - added|modified: '**.json'
              - added|modified: '**.jsonc'
              - added|modified: '**.md'
              - added|modified: '**.ps1'
              - added|modified: '**.yaml'
              - added|modified: '**.yml'
          list-files: escape
      - name: 🪲 Debug
        run: echo ${{ steps.filter.outputs.changed_files }}
  editorconfig-checker:
    name: Run EditorConfig-Checker on relevant changed files
    needs: changes
    if: ${{ needs.changes.outputs.changed == 'true' }}
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: 🪲 Debug
        run: echo ${{ needs.changes.outputs.files }}
      - name: 🛎️ GitHub checkout branch "${{ github.head_ref || github.ref_name }}"
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: ⬇️ Install EditorConfig-Checker
        run: go install github.com/editorconfig-checker/editorconfig-checker/v3/cmd/editorconfig-checker@latest
      - name: 🔍 Run EditorConfig-Checker
        run: |
          /home/runner/go/bin/editorconfig-checker -format github-actions \
          ${{ needs.changes.outputs.files }}
