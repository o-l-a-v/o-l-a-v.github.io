---
name: Lint markdown with rumdl

run-name: >
  ${{ github.event_name }}
  ${{ github.event.pull_request.number && format(' #{0}', github.event.pull_request.number) || '' }}
  by @${{ github.actor }} -
  ${{ github.workflow }}
  ${{ github.event.pull_request.title || github.event.head_commit.message || github.ref_name }}

on:  # ryl disable-line rule:truthy
  pull_request:
    paths:
      - '**.md'
      - '**/*rumdl.toml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-markdown:
    name: Run rumdl
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-slim
    steps:
      - name: 🛎️ GitHub checkout branch "${{ github.head_ref || github.ref_name }}"
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: 🔍 Get changed files
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4.0.2
        with:
          filters: |
            markdown:
              - added|modified: '**.md'
            rumdlconf:
              - added|modified: '{.,}rumdl.toml'
              - added|modified: '.config/{.,}rumdl.toml'
          list-files: escape
      - name: ⬇️ Install the latest version of uv
        if: steps.filter.outputs.markdown == 'true' || steps.filter.outputs.rumdlconf == 'true'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          cache-dependency-glob: ''
          enable-cache: true
          # renovate: datasource=github-releases depName=astral-sh/uv
          version: 0.11.28
      - name: 🔍 Lint changed markdown files with rumdl
        if: steps.filter.outputs.markdown == 'true' && steps.filter.outputs.rumdlconf == 'false'
        shell: bash
        run: uvx --config-file .config/uv.toml rumdl check ${{ steps.filter.outputs.markdown_files }}
      - name: 🔍 Lint all markdown files with rumdl when ".rumdl.toml" is updated
        if: steps.filter.outputs.rumdlconf == 'true'
        shell: bash
        run: uvx --config-file .config/uv.toml rumdl check .
