name: Lint markdown with rumdl

run-name: "${{ github.workflow }} - [${{ github.event.pull_request.title }} #${{ github.event.pull_request.number }}] by @${{ github.actor }}"

on:
  pull_request:
    paths:
      - "**.md"
      - ".rumdl.toml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-markdown:
    name: Run rumdl
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ GitHub checkout branch "${{ github.head_ref || github.ref_name }}"
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: 🔍 Get changed files
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            markdown:
              - added|modified: '**.md'
            rumdlconf:
              - added|modified: '.rumdl.toml'
          list-files: escape
      - name: 🔍 Lint changed markdown files with rumdl
        if: false # if: steps.filter.outputs.markdown == 'true' && steps.filter.outputs.rumdlconf == 'false'
        uses: rvben/rumdl@079e7a4b1315ae2d6070c0816c688ff526689815 # v0.1.15
        with:
          # path: ${{ steps.filter.outputs.markdown_files }}
          version: 0.1.15
      - name: 🔍 Lint all markdown files with rumdl (because ".rumdl.toml" changed)
        if: steps.filter.outputs.rumdlconf == 'true'
        uses: rvben/rumdl@079e7a4b1315ae2d6070c0816c688ff526689815 # v0.1.15
        with:
          version: 0.1.15
